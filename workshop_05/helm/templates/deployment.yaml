{{- $attendeeName := .Values.attendeeName | trim -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "workshop-greeter.fullname" . }}
  labels:
    {{- include "workshop-greeter.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "workshop-greeter.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "workshop-greeter.labels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if $attendeeName }}
          volumeMounts:
            - name: config
              mountPath: /opt/app-root/src/config.json
              subPath: config.json
          {{- end }}
      {{- if $attendeeName }}
      volumes:
        - name: config
          configMap:
            name: {{ include "workshop-greeter.fullname" . }}-config
      {{- end }}
